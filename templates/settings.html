{% extends "base.html" %}
{% set page = 'settings' %}
{% block content %}
<section class="card page-intro">
	<h1 class="page-title">Settings</h1>
	<p class="page-subtitle">Tune your focus cycle and system integrations.</p>
</section>

<section class="card settings-grid">
	<div>
		<h2>Session Durations</h2>
		<div class="form-grid">
			<label>Work (minutes)
				<input id="workDuration" type="number" min="1" step="1">
			</label>
			<label>Short Break (minutes)
				<input id="shortBreak" type="number" min="1" step="1">
			</label>
			<label>Long Break (minutes)
				<input id="longBreak" type="number" min="1" step="1">
			</label>
			<label>Long Break After (pomodoros)
				<input id="longBreakAfter" type="number" min="1" step="1">
			</label>
		</div>
	</div>

	<div>
		<h2>Integrations</h2>
		<div class="toggle-list">
			<label class="toggle-row">
				<span>Block Sites</span>
				<input id="blockSites" type="checkbox">
			</label>
			<label class="toggle-row">
				<span>Enable DND</span>
				<input id="enableDnd" type="checkbox">
			</label>
			<label class="toggle-row">
				<span>Dim Windows</span>
				<input id="dimWindows" type="checkbox">
			</label>
			<label>
				<span>Dim Opacity: <strong id="dimOpacityValue">50%</strong></span>
				<input id="dimOpacity" type="range" min="0" max="80" step="1">
			</label>
		</div>
	</div>

	<div class="settings-actions">
		<button id="saveSettingsBtn" class="btn btn-primary">Save Settings</button>
		<span id="saveStatus" class="muted-text"></span>
	</div>
</section>

<section class="card">
	<h2>Blocklist</h2>
	<div class="blocklist-add">
		<input id="domainInput" type="text" placeholder="Add domain (e.g. youtube.com)">
		<button id="addDomainBtn" class="btn">Add Domain</button>
	</div>
	<div id="blocklistRows" class="blocklist-rows"></div>
</section>

<section class="card">
	<h2>Permission Status</h2>
	<div id="permissionStatus" class="permission-status"></div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='settings.js') }}"></script>
{% endblock %}
